    <h2>Meng Da ?-228</h2>
    <p>Um oficial que serviu sob <a href="liu_zhang.html">Liu Zhang</a>, <a href="liu_bei.html">Liu Bei</a> e 
    <a href="cao_pi.html">Cao Pi</a>. Ele contribuiu para a campanha de Shu de <a href="liu_bei.html">Liu Bei</a>, mas 
    ele desertou <a href="guan_yu.html">Guan Yu</a> se juntou a Wei. Após a morte de <a href="cao_pi.html">Cao Pi</a>, 
    ele tentou retornar a Shu, mas foi impedido por <a href="sima_yi.html">Sima Yi</a>.</p>
