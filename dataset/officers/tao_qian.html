    <h2>Tao Qian 132-194</h2>
    <p>O Governador ed Xu. Ele foi um dos lordes feudais a conquistar glória durante a coalisão contra 
    <a href="dong_zhuo.html">Dong Zhuo</a>. Ele foi atacado por <a href="cao_cao.html">Cao Cao</a> e buscou a ajuda de 
    <a href="">Kong Rong</a> e <a href="liu_bei.html">Liu Bei</a>. Tempo depois, ele iria ficar doente e acabar morrendo, 
    deixando Xu aos cuidados de <a href="liu_bei.html">Liu Bei</a>.</p>
