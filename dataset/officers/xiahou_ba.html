    <h2>Xiahou Ba ?-262</h2>
    <p>Ele serviu como um oficial de ambos Shu e Wei. Filho mais velho de <a href="">Xiahou Yuan</a>. 
    Quando <a href="">Cao Shuang</a> foi assassinado por <a href="sima_yi.html">Sima Yi</a>, esse oficial 
    pressentiu o perigo e escapou para Shu. Sua irmã mais nova se casou com <a href="zhang_fei.html">Zhang Fei</a>, 
    e a filha deles se consorte de <a href="liu_shan.html">Liu Shan</a>.</p>
