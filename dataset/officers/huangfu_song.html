    <h2>Huangfu Song ?-195</h2>
    <p>Um servo do Han Oriental. Durante a 
    <a href="/dataset/battles/revolta_dos_turbantes_amarelos(batalha).html">Revolta dos Turbantes Amarelos</a>, ele 
    derrotou <a href="">Zhang Bao</a> e <a href="/dataset/officers/zhang_liang.html">Zhang Liang</a> com ataques 
    flamejantes, e tomou a cabeça de <a href="zhang_jiao.html">Zhang Jiao</a> do seu túmulo. Por um tempo ele levou 
    uma vida reclusa, mas após a morte de <a href="">Dong Zhuo, ele retornou a Corte Imperial.</a></p>
