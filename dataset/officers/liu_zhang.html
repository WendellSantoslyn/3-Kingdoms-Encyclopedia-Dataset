    <h2>Liu Zhang</h2>
    <p>Tenente Governador de Yi pelo Han Oriental e filho de <a href="">Liu Yan</a>. Em preparação para uma invasão de 
    <a href="zhang_lu.html">Zhang Lu</a>, ele convidou <a href="liu_bei.html">Liu Bei</a> de Jing para se juntar a ele. 
    No entanto, seu próprio povo, em busca de um líder forte, encorajou <a href="liu_bei.html">Liu Bei</a> a invadir 
    Chengdu, forçando Liu Zhang a renunciar.</p>
