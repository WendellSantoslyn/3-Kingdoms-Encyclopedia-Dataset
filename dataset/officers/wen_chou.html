    <h2>Wen Chou ?-200</h2>
    <p>Um general sob o comando de <a href="">Yuan Shao</a>. Em ordem de vingar seu companheiro 
    <a href="yan_liang.html">Yan Liang</a>, ele partiu para Yanjin, onde ele encontrou <a href="cao_cao.html">Cao Cao</a>
